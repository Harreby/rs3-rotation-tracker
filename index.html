<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Adaptive Logic</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #dcdcdc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #ffd700; }
        #m { width: 64px; height: 64px; border: 3px solid #ffd700; border-radius: 5px; background: #000; object-fit: contain; }
        .s { width: 30px; height: 30px; border: 1px solid #555; border-radius: 3px; background: #000; }
        .controls { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        input, select, textarea { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin-bottom: 8px; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        textarea { height: 65px; color: #b0ffb0; font-weight: bold; font-family: monospace; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-add { background: #444; color: #eee; width: 100%; margin-bottom: 8px; border: 1px solid #555; }
        .btn-run { background: #2e7d32; color: white; width: 45%; }
        .btn-next { background: #1565c0; color: white; width: 45%; }
        #status { font-size: 0.9em; color: #00ff00; margin-top: 8px; font-weight: bold; padding: 8px; background: #000; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div style="background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444;">
        <input type="text" id="preset-name" placeholder="Preset Name">
        <div style="display: flex; justify-content: space-between;">
            <button style="background:#6a1b9a; color:white; width:48%;" onclick="savePreset()">SAVE</button>
            <button style="background:#455a64; color:white; width:48%;" onclick="loadPreset()">LOAD</button>
        </div>
        <select id="saved-presets" style="margin-top:5px;" onchange="document.getElementById('preset-name').value = this.value"></select>
    </div>

    <div class="slots">
        <img id="m" crossorigin="anonymous">
        <div style="display:flex; flex-direction:column; gap:4px;">
            <img id="s1" class="s" crossorigin="anonymous">
            <img id="s2" class="s" crossorigin="anonymous">
        </div>
    </div>

    <div class="controls">
        <div id="status">STATUS: STANDBY</div>
        <select id="ability-picker">
            <optgroup label="Necromancy">
                <option value="Necromancy (ability)">Necromancy (Auto)</option>
                <option value="Touch of Death">Touch of Death</option>
                <option value="Soul Sap">Soul Sap</option>
                <option value="Soul Strike">Soul Strike</option>
                <option value="Volley of Souls">Volley of Souls</option>
                <option value="Finger of Death">Finger of Death</option>
                <option value="Death Skulls">Death Skulls</option>
                <option value="Soul Feast">Soul Feast</option>
                <option value="Bloat">Bloat</option>
                <option value="Blood Siphon">Blood Siphon</option>
                <option value="Spectral Scythe">Spectral Scythe</option>
                <option value="Living Death">Living Death</option>
                <option value="Conjure Undead Army">Conjure Undead Army</option>
                <option value="Command Skeleton Warrior">Command Skeleton</option>
                <option value="Command Putrid Zombie">Command Zombie</option>
                <option value="Command Vengeful Ghost">Command Ghost</option>
            </optgroup>
            <optgroup label="Core Abilities">
                <option value="Surge">Surge</option>
                <option value="Dive">Dive</option>
                <option value="Resonance">Resonance</option>
                <option value="Devotion">Devotion</option>
            </optgroup>
        </select>
        <button class="btn-add" onclick="addAbil()">+ Add to List</button>
        <textarea id="i" placeholder="Rotation Names..."></textarea>
        <div style="display: flex; justify-content: center;">
            <button class="btn-run" onclick="start()">START SCAN</button>
            <button class="btn-next" onclick="next()">SKIP NEXT</button>
        </div>
    </div>

    <script>
        let rotation = [];
        let isScanning = false;
        let lastPos = null;
        let baseBrightness = 0;

        window.onload = () => { refreshPresets(); if(window.alt1) alt1.identifyAppUrl("appconfig.json"); };

        function addAbil() {
            let area = document.getElementById("i");
            let val = document.getElementById("ability-picker").value;
            area.value += (area.value ? ", " : "") + val;
        }

        async function getIcon(name) {
            if(!name) return "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            const clean = name.trim().replace(/ /g, '_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            const resp = await fetch(url);
            const data = await resp.json();
            const id = Object.keys(data.query.pages)[0];
            return id !== "-1" ? data.query.pages[id].imageinfo[0].url : "";
        }

        async function updateUI() {
            document.getElementById("m").src = await getIcon(rotation[0]);
            document.getElementById("s1").src = await getIcon(rotation[1]);
            document.getElementById("s2").src = await getIcon(rotation[2]);
        }

        function savePreset() {
            localStorage.setItem("RS_ROT_" + document.getElementById("preset-name").value, document.getElementById("i").value);
            refreshPresets();
        }

        function loadPreset() {
            let data = localStorage.getItem("RS_ROT_" + document.getElementById("preset-name").value);
            if(data) { document.getElementById("i").value = data; start(); }
        }

        function refreshPresets() {
            const sel = document.getElementById("saved-presets");
            sel.innerHTML = '<option value="">-- Presets --</option>';
            for (let i = 0; i < localStorage.length; i++) {
                let k = localStorage.key(i);
                if (k.startsWith("RS_ROT_")) {
                    let o = document.createElement("option");
                    o.value = k.replace("RS_ROT_", ""); o.innerText = o.value;
                    sel.appendChild(o);
                }
            }
        }

        function start() {
            rotation = document.getElementById("i").value.split(',').map(s=>s.trim()).filter(s=>s!=="");
            updateUI();
            if(rotation.length > 0) { 
                isScanning = true; 
                lastPos = null; 
                baseBrightness = 0;
                loop(); 
            }
        }

        function next() {
            if(rotation.length > 1) {
                rotation.push(rotation.shift());
                updateUI();
                isScanning = false;
                lastPos = null; // Clear lock so it re-finds the next ability
                setTimeout(() => { isScanning = true; }, 1400); 
            }
        }

        function loop() {
            if(!isScanning || !window.alt1) { setTimeout(loop, 250); return; }
            let screen = alt1.bindlnInterface(0, 0, alt1.rsWidth, alt1.rsHeight);
            let target = document.getElementById("m");

            if (!lastPos) {
                // Find where the icon is on the bar (middle-scan)
                let found = screen.findSubimage(target, 0.5, 7, 7, 18, 18);
                if (found.length > 0) {
                    lastPos = found[0];
                    let cell = alt1.bindlnInterface(lastPos.x, lastPos.y, 18, 18);
                    let px = cell.getPixelColor(9, 9);
                    baseBrightness = (px.r + px.g + px.b) / 3;
                    document.getElementById("status").innerText = "LOCKED: " + rotation[0].toUpperCase();
                } else {
                    document.getElementById("status").innerText = "FINDING ON BAR...";
                }
            } else {
                let cell = alt1.bindlnInterface(lastPos.x, lastPos.y, 18, 18);
                let px = cell.getPixelColor(9, 9);
                let currentBrightness = (px.r + px.g + px.b) / 3;

                // TRIGGER: If brightness drops by more than 25% from its "Locked" state
                if (currentBrightness < (baseBrightness * 0.75)) {
                    document.getElementById("status").innerText = "MOVE DETECTED!";
                    next();
                }
            }
            setTimeout(loop, 250);
        }
    </script>
</body>
</html>
