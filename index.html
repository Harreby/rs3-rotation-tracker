<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Keypress Edition</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #dcdcdc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #ffd700; }
        #m { width: 64px; height: 64px; border: 3px solid #ffd700; border-radius: 5px; background: #000; object-fit: contain; }
        .s { width: 30px; height: 30px; border: 1px solid #555; border-radius: 3px; background: #000; }
        .controls { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        input, select, textarea { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin-bottom: 8px; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        textarea { height: 70px; color: #b0ffb0; font-weight: bold; font-family: monospace; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-add { background: #444; color: #eee; width: 100%; margin-bottom: 8px; border: 1px solid #555; }
        .btn-run { background: #2e7d32; color: white; width: 45%; }
        .btn-next { background: #1565c0; color: white; width: 45%; }
        #status { font-size: 0.9em; color: #ffd700; margin-top: 8px; font-weight: bold; padding: 8px; background: #000; border-radius: 4px; border: 1px solid #333; }
        optgroup[label="Necromancy"] { color: #c080ff; }
        optgroup[label="Melee"] { color: #ff6060; }
        optgroup[label="Ranged"] { color: #60ff60; }
        optgroup[label="Magic"] { color: #60c0ff; }
    </style>
</head>
<body>

    <div style="background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444;">
        <input type="text" id="preset-name" placeholder="Preset Name">
        <div style="display: flex; justify-content: space-between;">
            <button style="background:#6a1b9a; color:white; width:48%; font-size:11px;" onclick="savePreset()">SAVE</button>
            <button style="background:#455a64; color:white; width:48%; font-size:11px;" onclick="loadPreset()">LOAD</button>
        </div>
        <select id="saved-presets" style="margin-top:5px;" onchange="document.getElementById('preset-name').value = this.value"></select>
    </div>

    <div class="slots">
        <img id="m" crossorigin="anonymous">
        <div style="display:flex; flex-direction:column; gap:4px;">
            <img id="s1" class="s" crossorigin="anonymous">
            <img id="s2" class="s" crossorigin="anonymous">
        </div>
    </div>

    <div class="controls">
        <div id="status">PRESS START TO TRACK KEYS</div>
        
        <div style="display:flex; gap:5px; margin-bottom:8px;">
            <select id="ability-picker" style="flex:2;">
                <optgroup label="Necromancy">
                    <option value="Soul Sap">Soul Sap</option>
                    <option value="Touch of Death">Touch of Death</option>
                    <option value="Death Skulls">Death Skulls</option>
                    <option value="Finger of Death">Finger of Death</option>
                    <option value="Volley of Souls">Volley of Souls</option>
                    <option value="Soul Feast">Soul Feast</option>
                    <option value="Bloat">Bloat</option>
                    <option value="Living Death">Living Death</option>
                </optgroup>
                <optgroup label="Melee">
                    <option value="Greater Barge">G-Barge</option>
                    <option value="Greater Fury">G-Fury</option>
                    <option value="Assault">Assault</option>
                    <option value="Hurricane">Hurricane</option>
                </optgroup>
                <optgroup label="Ranged">
                    <option value="Greater Ricochet">G-Ricochet</option>
                    <option value="Snap Shot">Snap Shot</option>
                    <option value="Rapid Fire">Rapid Fire</option>
                </optgroup>
                <optgroup label="Magic">
                    <option value="Greater Sunshine">Sunshine</option>
                    <option value="Wild Magic">Wild Magic</option>
                    <option value="Asphyxiate">Asphyxiate</option>
                </optgroup>
                <optgroup label="Defensives">
                    <option value="Surge">Surge</option>
                    <option value="Dive">Dive</option>
                    <option value="Resonance">Resonance</option>
                </optgroup>
            </select>
            <input type="text" id="key-input" placeholder="Key (e.g. E)" style="flex:1; margin:0;">
        </div>
        
        <button class="btn-add" onclick="addAbil()">+ Add (Ability + Key)</button>
        
        <textarea id="i" placeholder="Rotation (Ability:Key)..."></textarea>
        
        <div style="display: flex; justify-content: center;">
            <button class="btn-run" onclick="start()">START TRACKING</button>
            <button class="btn-next" onclick="next()">SKIP</button>
        </div>
    </div>

    <script>
        let rotation = []; // Stores {name: "Soul Sap", key: "E"}
        let isTracking = false;

        window.onload = () => { 
            refreshPresets(); 
            if(window.alt1) {
                alt1.identifyAppUrl("appconfig.json");
                // Listen for key events
                alt1.events.keydown.push(e => {
                    if(isTracking && rotation.length > 0) {
                        let targetKey = rotation[0].key.toLowerCase();
                        let pressedKey = String.fromCharCode(e.key).toLowerCase();
                        if(pressedKey === targetKey) {
                            next();
                        }
                    }
                });
            }
        };

        function addAbil() {
            let name = document.getElementById("ability-picker").value;
            let key = document.getElementById("key-input").value.toUpperCase();
            if(!key) { alert("Enter a keybind!"); return; }
            let area = document.getElementById("i");
            area.value += (area.value ? ", " : "") + `${name}:${key}`;
        }

        async function getIcon(name) {
            if(!name) return "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            const clean = name.trim().replace(/ /g, '_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            const resp = await fetch(url);
            const data = await resp.json();
            const id = Object.keys(data.query.pages)[0];
            return id !== "-1" ? data.query.pages[id].imageinfo[0].url : "";
        }

        async function updateUI() {
            document.getElementById("m").src = await getIcon(rotation[0]?.name);
            document.getElementById("s1").src = await getIcon(rotation[1]?.name);
            document.getElementById("s2").src = await getIcon(rotation[2]?.name);
            if(rotation[0]) {
                document.getElementById("status").innerText = `WAITING FOR KEY: [ ${rotation[0].key} ]`;
            }
        }

        function start() {
            let raw = document.getElementById("i").value.split(',');
            rotation = raw.map(item => {
                let parts = item.split(':');
                return { name: parts[0].trim(), key: parts[1]?.trim() || "" };
            }).filter(item => item.name !== "");
            
            if(rotation.length > 0) {
                isTracking = true;
                updateUI();
            }
        }

        function next() {
            if(rotation.length > 1) {
                rotation.push(rotation.shift());
                updateUI();
            }
        }

        function savePreset() {
            localStorage.setItem("RS_KEY_ROT_" + document.getElementById("preset-name").value, document.getElementById("i").value);
            refreshPresets();
        }

        function loadPreset() {
            let data = localStorage.getItem("RS_KEY_ROT_" + document.getElementById("preset-name").value);
            if(data) { document.getElementById("i").value = data; start(); }
        }

        function refreshPresets() {
            const sel = document.getElementById("saved-presets");
            sel.innerHTML = '<option value="">-- Presets --</option>';
            for (let i = 0; i < localStorage.length; i++) {
                let k = localStorage.key(i);
                if (k.startsWith("RS_KEY_ROT_")) {
                    let o = document.createElement("option");
                    o.value = k.replace("RS_KEY_ROT_", ""); o.innerText = o.value;
                    sel.appendChild(o);
                }
            }
        }
    </script>
</body>
</html>
