<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Hotkey Edition</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #dcdcdc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #ffd700; }
        #m { width: 64px; height: 64px; border: 3px solid #ffd700; border-radius: 5px; background: #000; object-fit: contain; }
        .s { width: 30px; height: 30px; border: 1px solid #555; border-radius: 3px; background: #000; }
        .controls { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        input, select, textarea { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin-bottom: 8px; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        textarea { height: 80px; color: #b0ffb0; font-weight: bold; font-family: monospace; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-add { background: #444; color: #eee; width: 100%; border: 1px solid #555; margin-bottom: 8px; }
        .btn-run { background: #2e7d32; color: white; width: 95%; margin-top: 5px; }
        #status { font-size: 0.9em; color: #ffd700; margin-top: 8px; font-weight: bold; padding: 8px; background: #000; border-radius: 4px; border: 1px solid #333; }
        optgroup { background: #111; }
        .hotkey-hint { font-size: 10px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div style="background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
        <input type="text" id="preset-name" placeholder="Preset Name">
        <div style="display: flex; justify-content: space-between;">
            <button style="background:#6a1b9a; color:white; width:48%; font-size:11px;" onclick="savePreset()">SAVE</button>
            <button style="background:#455a64; color:white; width:48%; font-size:11px;" onclick="loadPreset()">LOAD</button>
        </div>
        <select id="saved-presets" style="margin-top:5px;" onchange="document.getElementById('preset-name').value = this.value"></select>
    </div>

    <div class="slots">
        <img id="m" crossorigin="anonymous">
        <div style="display:flex; flex-direction:column; gap:4px;">
            <img id="s1" class="s" crossorigin="anonymous">
            <img id="s2" class="s" crossorigin="anonymous">
        </div>
    </div>

    <div class="controls">
        <div id="status">HOVER SLOT & PRESS ALT+1</div>
        <div class="hotkey-hint">Hover Slot 1 on your Bar, then press Alt+1 to Lock/Start</div>
        
        <select id="ability-picker">
            <optgroup label="Necromancy">
                <option value="Necromancy (ability)">Necro Auto</option>
                <option value="Touch of Death">Touch of Death</option>
                <option value="Soul Sap">Soul Sap</option>
                <option value="Soul Strike">Soul Strike</option>
                <option value="Volley of Souls">Volley of Souls</option>
                <option value="Finger of Death">Finger of Death</option>
                <option value="Death Skulls">Death Skulls</option>
                <option value="Soul Feast">Soul Feast</option>
                <option value="Bloat">Bloat</option>
                <option value="Blood Siphon">Blood Siphon</option>
                <option value="Spectral Scythe">Spectral Scythe</option>
                <option value="Living Death">Living Death</option>
                <option value="Conjure Undead Army">Conjure Army</option>
                <option value="Command Skeleton Warrior">Command Skeleton</option>
                <option value="Command Putrid Zombie">Command Zombie</option>
                <option value="Command Vengeful Ghost">Command Ghost</option>
                <option value="Command Phantom Guardian">Command Phantom</option>
            </optgroup>
            <optgroup label="Melee">
                <option value="Greater Barge">G-Barge</option>
                <option value="Greater Fury">G-Fury</option>
                <option value="Greater Flurry">G-Flurry</option>
                <option value="Decimate">Decimate</option>
                <option value="Sever">Sever</option>
                <option value="Dismember">Dismember</option>
                <option value="Cleave">Cleave</option>
                <option value="Assault">Assault</option>
                <option value="Hurricane">Hurricane</option>
                <option value="Berserk">Berserk</option>
                <option value="Overpower">Overpower</option>
                <option value="Meteor Strike">Meteor Strike</option>
            </optgroup>
            <optgroup label="Ranged">
                <option value="Greater Ricochet">G-Ricochet</option>
                <option value="Greater Deaths Swiftness">G-Swiftness</option>
                <option value="Needle Strike">Needle Strike</option>
                <option value="Dazing Shot">Dazing Shot</option>
                <option value="Snap Shot">Snap Shot</option>
                <option value="Rapid Fire">Rapid Fire</option>
                <option value="Bombardment">Bombardment</option>
                <option value="Snipe">Snipe</option>
                <option value="Incendiary Shot">Incendiary</option>
                <option value="Fragmentation Shot">Frag Shot</option>
            </optgroup>
            <optgroup label="Magic">
                <option value="Greater Concentrated Blast">G-Conc</option>
                <option value="Greater Sonic Wave">G-Sonic</option>
                <option value="Greater Sunshine">G-Sunshine</option>
                <option value="Wild Magic">Wild Magic</option>
                <option value="Asphyxiate">Asphyxiate</option>
                <option value="Dragon Breath">Dragon Breath</option>
                <option value="Omnipower">Omnipower</option>
                <option value="Magma Tempest">Magma Tempest</option>
                <option value="Tsunami">Tsunami</option>
            </optgroup>
            <optgroup label="Defensives/Utility">
                <option value="Surge">Surge</option>
                <option value="Dive">Dive</option>
                <option value="Resonance">Resonance</option>
                <option value="Devotion">Devotion</option>
                <option value="Freedom">Freedom</option>
                <option value="Anticipation">Anticipation</option>
                <option value="Reflect">Reflect</option>
                <option value="Barricade">Barricade</option>
                <option value="Debilitate">Debilitate</option>
                <option value="Preparation">Preparation</option>
            </optgroup>
        </select>
        <button class="btn-add" onclick="addAbil()">+ Add to Rotation</button>
        
        <textarea id="i" placeholder="Rotation List..."></textarea>
        <button class="btn-run" onclick="start()">START SCAN (MANUAL)</button>
    </div>

    <script>
        let rotation = [];
        let isScanning = false;
        let lockedPos = null;

        window.onload = () => {
            refreshPresets();
            if (window.alt1) {
                alt1.identifyAppUrl("appconfig.json");
                
                // Listen for Alt+1 Hotkey
                alt1.events.keystatedown.push(e => {
                    // Check if Alt (18) and '1' (49) are pressed
                    if (e.key == 49) { 
                        let pos = alt1.mousePosition;
                        lockedPos = { x: pos.x, y: pos.y };
                        document.getElementById("status").innerText = "LOCKED & STARTING...";
                        start();
                    }
                });
            }
        };

        function addAbil() {
            let area = document.getElementById("i");
            area.value += (area.value ? ", " : "") + document.getElementById("ability-picker").value;
        }

        async function getIcon(name) {
            if(!name) return "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            const clean = name.trim().replace(/ /g, '_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            const resp = await fetch(url);
            const data = await resp.json();
            const id = Object.keys(data.query.pages)[0];
            return id !== "-1" ? data.query.pages[id].imageinfo[0].url : "";
        }

        async function updateUI() {
            document.getElementById("m").src = await getIcon(rotation[0]);
            document.getElementById("s1").src = await getIcon(rotation[1]);
            document.getElementById("s2").src = await getIcon(rotation[2]);
        }

        function start() {
            rotation = document.getElementById("i").value.split(',').map(s=>s.trim()).filter(s=>s!=="");
            if(rotation.length === 0) { document.getElementById("status").innerText = "ADD ABILITIES FIRST!"; return; }
            updateUI();
            if(lockedPos) {
                isScanning = true;
                loop();
            } else {
                document.getElementById("status").innerText = "PRESS ALT+1 OVER SLOT!";
            }
        }

        function next() {
            if(rotation.length > 1) {
                rotation.push(rotation.shift());
                updateUI();
                isScanning = false;
                // Cooldown on the tracker itself to prevent instant multi-skips
                setTimeout(() => { isScanning = true; }, 1450); 
            }
        }

        function loop() {
            if(!isScanning || !lockedPos || !window.alt1) { setTimeout(loop, 250); return; }
            
            // Get color from the locked action bar coordinate
            let colors = alt1.getPixelColor(lockedPos.x, lockedPos.y);
            
            // Trigger logic: 
            // 1. White (Cooldown number text)
            // 2. Dark (Ability used / lack of adrenaline)
            let white = (colors.r > 210 && colors.g > 210 && colors.b > 210);
            let dark = (colors.r < 58 && colors.g < 58 && colors.b < 58);

            if (white || dark) {
                document.getElementById("status").innerText = "ACTION DETECTED!";
                next();
            }

            setTimeout(loop, 250);
        }

        function savePreset() {
            let name = document.getElementById("preset-name").value;
            if(!name) return;
            localStorage.setItem("RS_ROT_M_" + name, document.getElementById("i").value);
            refreshPresets();
        }

        function loadPreset() {
            let name = document.getElementById("preset-name").value;
            let data = localStorage.getItem("RS_ROT_M_" + name);
            if(data) {
                document.getElementById("i").value = data;
                start();
            }
        }

        function refreshPresets() {
            const sel = document.getElementById("saved-presets");
            sel.innerHTML = '<option value="">-- Presets --</option>';
            for (let i = 0; i < localStorage.length; i++) {
                let k = localStorage.key(i);
                if (k.startsWith("RS_ROT_M_")) {
                    let o = document.createElement("option");
                    o.value = k.replace("RS_ROT_M_", ""); o.innerText = o.value;
                    sel.appendChild(o);
                }
            }
        }
    </script>
</body>
</html>
