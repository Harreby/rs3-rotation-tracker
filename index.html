<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Boss Pro (Full Ability Suite)</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #dcdcdc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; background: rgba(45, 45, 45, 0.9); padding: 12px; border-radius: 8px; border: 1px solid #444; min-height: 90px; }
        #m { width: 70px; height: 70px; border: 3px solid #ffd700; border-radius: 5px; background: #000; object-fit: contain; }
        .s-container { display: flex; flex-direction: column; gap: 4px; }
        .s { width: 32px; height: 32px; border: 1px solid #666; border-radius: 3px; background: #000; }
        
        .controls { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .preset-manager { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #555; }
        
        input, select, textarea { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin-bottom: 8px; box-sizing: border-box; font-family: monospace; font-size: 12px; }
        textarea { height: 80px; resize: none; color: #b0ffb0; border-radius: 4px; }

        /* Ability-Specific Styling */
        [label="Melee"], [label="Melee"] option { color: #ff6060; font-weight: bold; }
        [label="Ranged"], [label="Ranged"] option { color: #60ff60; font-weight: bold; }
        [label="Magic"], [label="Magic"] option { color: #60c0ff; font-weight: bold; }
        [label="Necromancy"], [label="Necromancy"] option { color: #c080ff; font-weight: bold; }
        [label*="Defen"], [label*="Defen"] option { color: #aaaaaa; }

        button { padding: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-add { background: #444; color: #eee; width: 100%; margin-bottom: 10px; border: 1px solid #555;}
        .btn-run { background: #2e7d32; color: white; width: 45%; }
        .btn-next { background: #1565c0; color: white; width: 45%; }
        .btn-preset-save { background: #6a1b9a; color: white; width: 48%; }
        .btn-preset-load { background: #455a64; color: white; width: 48%; }
        
        #status { font-size: 0.85em; color: #ff9800; margin-top: 8px; font-weight: bold; padding: 5px; background: #111; border-radius: 4px;}
        .small-text { font-size: 0.7em; color: #aaa; margin-bottom: 5px; display: block; text-align: left;}
    </style>
</head>
<body>

    <div class="preset-manager">
        <label class="small-text">BOSS PRESET NAME</label>
        <input type="text" id="preset-name" placeholder="e.g. Telos P4">
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-preset-save" onclick="savePreset()">SAVE PRESET</button>
            <button class="btn-preset-load" onclick="loadPreset()">LOAD PRESET</button>
        </div>
        <select id="saved-presets" onchange="document.getElementById('preset-name').value = this.value">
            <option value="">-- Saved Presets --</option>
        </select>
    </div>

    <div class="slots">
        <img id="m" crossorigin="anonymous">
        <div class="s-container">
            <img id="s1" class="s" crossorigin="anonymous">
            <img id="s2" class="s" crossorigin="anonymous">
        </div>
    </div>

    <div class="controls">
        <div id="status">STATUS: STANDBY</div>
        
        <select id="ability-picker">
            <optgroup label="Necromancy">
                <option value="Necromancy (ability)">Necromancy (Auto)</option>
                <option value="Touch of Death">Touch of Death</option>
                <option value="Soul Sap">Soul Sap</option>
                <option value="Soul Strike">Soul Strike</option>
                <option value="Volley of Souls">Volley of Souls</option>
                <option value="Finger of Death">Finger of Death</option>
                <option value="Death Skulls">Death Skulls</option>
                <option value="Soul Feast">Soul Feast</option>
                <option value="Bloat">Bloat</option>
                <option value="Blood Siphon">Blood Siphon</option>
                <option value="Spectral Scythe">Spectral Scythe</option>
                <option value="Living Death">Living Death</option>
                <option value="Conjure Undead Army">Conjure Undead Army</option>
                <option value="Conjure Skeleton Warrior">Conjure Skeleton</option>
                <option value="Command Skeleton Warrior">Command Skeleton</option>
                <option value="Conjure Putrid Zombie">Conjure Zombie</option>
                <option value="Command Putrid Zombie">Command Zombie</option>
                <option value="Conjure Vengeful Ghost">Conjure Ghost</option>
                <option value="Command Vengeful Ghost">Command Ghost</option>
                <option value="Conjure Phantom Guardian">Conjure Phantom</option>
                <option value="Command Phantom Guardian">Command Phantom</option>
            </optgroup>
            <optgroup label="Melee">
                <option value="Greater Barge">Greater Barge</option>
                <option value="Greater Fury">Greater Fury</option>
                <option value="Greater Flurry">Greater Flurry</option>
                <option value="Slice">Slice</option>
                <option value="Dismember">Dismember</option>
                <option value="Cleave">Cleave</option>
                <option value="Decimate">Decimate</option>
                <option value="Sever">Sever</option>
                <option value="Havoc">Havoc</option>
                <option value="Assault">Assault</option>
                <option value="Destroy">Destroy</option>
                <option value="Hurricane">Hurricane</option>
                <option value="Quake">Quake</option>
                <option value="Backhand">Backhand</option>
                <option value="Forceful Backhand">Forceful Backhand</option>
                <option value="Berserk">Berserk</option>
                <option value="Meteor Strike">Meteor Strike</option>
                <option value="Overpower">Overpower</option>
            </optgroup>
            <optgroup label="Ranged">
                <option value="Greater Ricochet">Greater Ricochet</option>
                <option value="Greater Deaths Swiftness">Death's Swiftness</option>
                <option value="Needle Strike">Needle Strike</option>
                <option value="Dazing Shot">Dazing Shot</option>
                <option value="Greater Dazing Shot">G-Dazing Shot</option>
                <option value="Snipe">Snipe</option>
                <option value="Fragmentation Shot">Frag Shot</option>
                <option value="Corruption Shot">Corruption Shot</option>
                <option value="Snap Shot">Snap Shot</option>
                <option value="Rapid Fire">Rapid Fire</option>
                <option value="Bombardment">Bombardment</option>
                <option value="Salt the Wound">Salt the Wound</option>
                <option value="Shadow Tendrils">Shadow Tendrils</option>
                <option value="Incendiary Shot">Incendiary Shot</option>
                <option value="Deadshot">Deadshot</option>
            </optgroup>
            <optgroup label="Magic">
                <option value="Greater Concentrated Blast">G-Conc Blast</option>
                <option value="Greater Sonic Wave">G-Sonic Wave</option>
                <option value="Greater Sunshine">Sunshine</option>
                <option value="Dragon Breath">Dragon Breath</option>
                <option value="Corruption Blast">Corruption Blast</option>
                <option value="Combust">Combust</option>
                <option value="Impact">Impact</option>
                <option value="Shock">Shock</option>
                <option value="Wild Magic">Wild Magic</option>
                <option value="Asphyxiate">Asphyxiate</option>
                <option value="Deep Freeze">Deep Freeze</option>
                <option value="Magma Tempest">Magma Tempest</option>
                <option value="Omnipower">Omnipower</option>
                <option value="Tsunami">Tsunami</option>
            </optgroup>
            <optgroup label="Constitution / Defense / Movement">
                <option value="Surge">Surge</option>
                <option value="Dive">Dive</option>
                <option value="Escape">Escape</option>
                <option value="Anticipation">Anticipation</option>
                <option value="Freedom">Freedom</option>
                <option value="Resonance">Resonance</option>
                <option value="Preparation">Preparation</option>
                <option value="Devotion">Devotion</option>
                <option value="Debilitate">Debilitate</option>
                <option value="Reflect">Reflect</option>
                <option value="Revenge">Revenge</option>
                <option value="Barricade">Barricade</option>
                <option value="Immortal">Immortal</option>
            </optgroup>
        </select>
        <button class="btn-add" onclick="addFromDropdown()">+ Add to Rotation</button>
        <textarea id="i" placeholder="Rotation (comma separated)..."></textarea>
        
        <div style="display: flex; justify-content: center;">
            <button class="btn-run" onclick="start()">SAVE & RUN</button>
            <button class="btn-next" onclick="next()">SKIP NEXT</button>
        </div>
    </div>

    <script>
        let rotation = [];
        let isScanning = false;

        window.onload = () => {
            refreshPresetList();
            if (window.alt1) alt1.identifyAppUrl("appconfig.json");
        };

        function refreshPresetList() {
            const select = document.getElementById("saved-presets");
            const presets = JSON.parse(localStorage.getItem('rotTrackerPresets') || '{}');
            select.innerHTML = '<option value="">-- Saved Presets --</option>';
            for (let name in presets) {
                let opt = document.createElement("option");
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            }
        }

        function savePreset() {
            const name = document.getElementById("preset-name").value;
            const content = document.getElementById("i").value;
            if (!name) { document.getElementById("status").innerText = "ENTER PRESET NAME!"; return; }
            let presets = JSON.parse(localStorage.getItem('rotTrackerPresets') || '{}');
            presets[name] = content;
            localStorage.setItem('rotTrackerPresets', JSON.stringify(presets));
            refreshPresetList();
            document.getElementById("status").innerText = "SAVED: " + name;
        }

        function loadPreset() {
            const name = document.getElementById("preset-name").value;
            const presets = JSON.parse(localStorage.getItem('rotTrackerPresets') || '{}');
            if (presets[name]) {
                document.getElementById("i").value = presets[name];
                document.getElementById("status").innerText = "LOADED: " + name;
                start();
            }
        }

        async function getWikiIcon(name) {
            if (!name) return "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            const clean = name.trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const id = Object.keys(data.query.pages)[0];
                return id !== "-1" ? data.query.pages[id].imageinfo[0].url : "";
            } catch (e) { return ""; }
        }

        async function updateUI() {
            document.getElementById("m").src = await getWikiIcon(rotation[0]);
            document.getElementById("s1").src = await getWikiIcon(rotation[1]);
            document.getElementById("s2").src = await getWikiIcon(rotation[2]);
        }

        function addFromDropdown() {
            const input = document.getElementById("i");
            const val = document.getElementById("ability-picker").value;
            input.value += (input.value.trim().length > 0 ? ", " : "") + val;
        }

        function start() {
            rotation = document.getElementById("i").value.split(',').map(s => s.trim()).filter(s => s !== "");
            updateUI();
            if(rotation.length > 0) {
                isScanning = true;
                document.getElementById("status").innerText = "SCANNING...";
                checkLoop();
            }
        }

        function next() {
            if (rotation.length > 1) {
                rotation.push(rotation.shift());
                updateUI();
                isScanning = false;
                setTimeout(() => { isScanning = true; }, 1200); 
            }
        }

        function checkLoop() {
            if (!isScanning || !window.alt1) { setTimeout(checkLoop, 200); return; }
            let screen = alt1.bindlnInterface(0, 0, alt1.rsWidth, alt1.rsHeight);
            let target = document.getElementById("m");
            let found = screen.findSubimage(target);
            if (found.length === 0) {
                document.getElementById("status").innerText = "DETECTED!";
                next();
            } else {
                document.getElementById("status").innerText = "WATCHING...";
            }
            setTimeout(checkLoop, 200);
        }
    </script>
</body>
</html>
