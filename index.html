<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Zero-Typing Snapshot</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #dcdcdc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #ffd700; }
        canvas { background: #000; image-rendering: pixelated; border-radius: 4px; }
        #m_canvas { width: 64px; height: 64px; border: 2px solid #ffd700; }
        .s { width: 30px; height: 30px; border: 1px solid #555; }
        
        .controls { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        input, select, textarea { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin-bottom: 8px; box-sizing: border-box; font-size: 12px; }
        textarea { height: 60px; resize: none; color: #b0ffb0; font-weight: bold; pointer-events: none; }

        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-snap { background: #e65100; color: white; width: 100%; border: 2px solid #ff9800; margin-bottom: 10px; }
        .btn-run { background: #2e7d32; color: white; width: 45%; }
        .btn-next { background: #1565c0; color: white; width: 45%; }
        
        #status { font-size: 0.9em; color: #00ff00; margin-top: 8px; font-weight: bold; padding: 8px; background: #000; border-radius: 4px;}
        .hint { font-size: 0.7em; color: #aaa; display: block; margin-bottom: 8px; text-align: left; }
    </style>
</head>
<body>

    <div style="background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
        <input type="text" id="preset-name" placeholder="Boss Name">
        <div style="display: flex; justify-content: space-between;">
            <button style="background:#6a1b9a; width:48%; color:white;" onclick="savePreset()">SAVE</button>
            <button style="background:#455a64; width:48%; color:white;" onclick="loadPreset()">LOAD</button>
        </div>
        <select id="saved-presets" style="margin-top:5px;" onchange="document.getElementById('preset-name').value = this.value"></select>
    </div>

    <div class="slots">
        <canvas id="m_canvas" width="32" height="32"></canvas>
        <div style="display:flex; flex-direction:column; gap:4px;">
            <canvas id="s1_canvas" width="32" height="32" class="s"></canvas>
            <canvas id="s2_canvas" width="32" height="32" class="s"></canvas>
        </div>
    </div>

    <div class="controls">
        <div id="status">STATUS: IDLE</div>
        <span class="hint"><b>FAST SYNC:</b> Click SNAP, hover ability, wait for flash. Repeat.</span>
        <button class="btn-snap" onclick="startSnap()">SNAP ABILITY (3s)</button>
        
        <textarea id="rot-list" readonly></textarea>
        
        <div style="display: flex; justify-content: center;">
            <button class="btn-run" id="run-btn" onclick="toggleScan()">START</button>
            <button class="btn-next" onclick="next()">SKIP</button>
        </div>
        <button style="font-size:10px; background:#444; color:#ccc; width:100%; margin-top:10px;" onclick="clearRot()">CLEAR ALL</button>
    </div>

    <script>
        let rotationData = []; 
        let isScanning = false;

        window.onload = () => { refreshPresets(); if(window.alt1) alt1.identifyAppUrl("appconfig.json"); };

        function startSnap() {
            let timer = 3;
            const countdown = setInterval(() => {
                document.getElementById("status").innerText = `HOVER IN: ${timer}...`;
                timer--;
                if (timer < 0) { clearInterval(countdown); capture(); }
            }, 1000);
        }

        function capture() {
            if(!window.alt1) return;
            let pos = alt1.mousePosition;
            let img = alt1.bindlnInterface(pos.x - 16, pos.y - 16, 32, 32);
            let canv = document.createElement("canvas");
            canv.width = 32; canv.height = 32;
            img.toCanvas(canv);
            
            // Auto-name based on count
            let autoName = "Slot " + (rotationData.length + 1);
            
            rotationData.push({
                name: autoName,
                data: canv.toDataURL(),
                x: pos.x - 16,
                y: pos.y - 16
            });
            
            updateUI();
            document.getElementById("status").innerText = "ADDED " + autoName;
        }

        function updateUI() {
            const draw = (id, idx) => {
                const ctx = document.getElementById(id).getContext("2d");
                ctx.clearRect(0,0,32,32);
                if(rotationData[idx]) {
                    let img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = rotationData[idx].data;
                }
            };
            draw("m_canvas", 0); draw("s1_canvas", 1); draw("s2_canvas", 2);
            document.getElementById("rot-list").value = rotationData.map(r => r.name).join(" > ");
        }

        function savePreset() {
            let n = document.getElementById("preset-name").value;
            if(!n) return;
            localStorage.setItem("snapRot_" + n, JSON.stringify(rotationData));
            refreshPresets();
            document.getElementById("status").innerText = "SAVED: " + n;
        }

        function loadPreset() {
            let n = document.getElementById("preset-name").value;
            let saved = localStorage.getItem("snapRot_" + n);
            if(saved) {
                rotationData = JSON.parse(saved);
                updateUI();
                document.getElementById("status").innerText = "LOADED: " + n;
            }
        }

        function refreshPresets() {
            const sel = document.getElementById("saved-presets");
            sel.innerHTML = '<option value="">-- Presets --</option>';
            for (let i = 0; i < localStorage.length; i++) {
                let k = localStorage.key(i);
                if (k.startsWith("snapRot_")) {
                    let o = document.createElement("option");
                    o.value = k.replace("snapRot_", ""); o.innerText = o.value;
                    sel.appendChild(o);
                }
            }
        }

        function toggleScan() {
            isScanning = !isScanning;
            document.getElementById("run-btn").innerText = isScanning ? "STOP" : "START";
            if(isScanning) loop();
        }

        function next() {
            if(rotationData.length > 1) {
                rotationData.push(rotationData.shift());
                updateUI();
                isScanning = false;
                setTimeout(() => { if(isScanning === false && document.getElementById("run-btn").innerText === "STOP") isScanning = true; }, 1400);
            }
        }

        function clearRot() { rotationData = []; updateUI(); isScanning = false; }

        function loop() {
            if(!isScanning || rotationData.length === 0) return;
            let current = rotationData[0];
            let screen = alt1.bindlnInterface(current.x, current.y, 32, 32);
            let checkImg = new Image();
            checkImg.src = current.data;
            
            // Fast exact-spot check
            if (screen.findSubimage(checkImg).length === 0) {
                next();
            }
            setTimeout(() => { if(isScanning) loop(); }, 200);
        }
    </script>
</body>
</html>
