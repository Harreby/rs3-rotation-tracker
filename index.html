<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Boss Presets Pro</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { background: #1a1a1a; color: #dcdcdc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; background: rgba(45, 45, 45, 0.9); padding: 12px; border-radius: 8px; border: 1px solid #444; }
        #m { width: 70px; height: 70px; border: 3px solid #ffd700; border-radius: 5px; background: #000; object-fit: contain; }
        .s-container { display: flex; flex-direction: column; gap: 4px; }
        .s { width: 32px; height: 32px; border: 1px solid #666; border-radius: 3px; background: #000; }
        
        .controls { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .preset-manager { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #555; }
        
        input, select, textarea { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin-bottom: 8px; box-sizing: border-box; font-family: monospace; font-size: 12px; }
        textarea { height: 50px; resize: none; color: #b0ffb0; }

        button { padding: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-add { background: #444; color: #eee; width: 100%; }
        .btn-save { background: #2e7d32; color: white; width: 45%; }
        .btn-next { background: #1565c0; color: white; width: 45%; }
        .btn-preset { background: #6a1b9a; color: white; width: 100%; margin-top: 5px; }
        
        #status { font-size: 0.85em; color: #ff9800; margin-top: 8px; font-weight: bold; padding: 5px; background: #111; border-radius: 4px;}
        .small-text { font-size: 0.7em; color: #aaa; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="preset-manager">
        <label class="small-text">BOSS PRESET NAME</label>
        <input type="text" id="preset-name" placeholder="e.g. Telos">
        <div style="display: flex; gap: 5px;">
            <button class="btn-preset" onclick="savePreset()">SAVE PRESET</button>
            <button class="btn-preset" style="background:#455a64" onclick="loadPreset()">LOAD PRESET</button>
        </div>
        <select id="saved-presets" onchange="document.getElementById('preset-name').value = this.value">
            <option value="">-- Saved Presets --</option>
        </select>
    </div>

    <div class="slots">
        <img id="m" crossorigin="anonymous">
        <div class="s-container">
            <img id="s1" class="s" crossorigin="anonymous">
            <img id="s2" class="s" crossorigin="anonymous">
        </div>
    </div>

    <div class="controls">
        <div id="status">STATUS: STANDBY</div>
        
        <select id="ability-picker">
            <optgroup label="Necromancy">
                <option value="Necromancy (ability)">Necromancy (Auto)</option>
                <option value="Touch of Death">Touch of Death</option>
                <option value="Finger of Death">Finger of Death</option>
                <option value="Death Skulls">Death Skulls</option>
                <option value="Conjure Undead Army">Conjure Undead Army</option>
                <option value="Command Skeleton Warrior">Command Skeleton</option>
                <option value="Bloat">Bloat</option>
            </optgroup>
            <option value="Surge">Surge</option>
             <option value="Dive">Dive</option>
        </select>
        <button class="btn-add" onclick="addFromDropdown()">+ Add to Rotation</button>
        <textarea id="i" placeholder="Rotation List..."></textarea>
        
        <div style="display: flex; justify-content: center;">
            <button class="btn-save" onclick="start()">RUN ROTATION</button>
            <button class="btn-next" onclick="next()">SKIP</button>
        </div>
    </div>

    <script>
        let rotation = [];
        let isScanning = false;
        let presets = JSON.parse(localStorage.getItem('rotTrackerPresets') || '{}');

        window.onload = () => {
            refreshPresetList();
            if (window.alt1) alt1.identifyAppUrl("appconfig.json");
        };

        function refreshPresetList() {
            const select = document.getElementById("saved-presets");
            select.innerHTML = '<option value="">-- Saved Presets --</option>';
            for (let name in presets) {
                let opt = document.createElement("option");
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            }
        }

        function savePreset() {
            const name = document.getElementById("preset-name").value;
            if (!name) return alert("Enter a name!");
            presets[name] = document.getElementById("i").value;
            localStorage.setItem('rotTrackerPresets', JSON.stringify(presets));
            refreshPresetList();
            document.getElementById("status").innerText = "PRESET SAVED!";
        }

        function loadPreset() {
            const name = document.getElementById("preset-name").value;
            if (presets[name]) {
                document.getElementById("i").value = presets[name];
                document.getElementById("status").innerText = "PRESET LOADED!";
                start();
            }
        }

        async function getWikiIcon(name) {
            if (!name) return "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            const clean = name.trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const id = Object.keys(data.query.pages)[0];
                return id !== "-1" ? data.query.pages[id].imageinfo[0].url : "";
            } catch (e) { return ""; }
        }

        async function updateUI() {
            document.getElementById("m").src = await getWikiIcon(rotation[0]);
            document.getElementById("s1").src = await getWikiIcon(rotation[1]);
            document.getElementById("s2").src = await getWikiIcon(rotation[2]);
        }

        function addFromDropdown() {
            const input = document.getElementById("i");
            input.value += (input.value.trim().length > 0 ? ", " : "") + document.getElementById("ability-picker").value;
        }

        function start() {
            rotation = document.getElementById("i").value.split(',').map(s => s.trim()).filter(s => s !== "");
            updateUI();
            if(rotation.length > 0) {
                isScanning = true;
                checkLoop();
            }
        }

        function next() {
            if (rotation.length > 1) {
                rotation.push(rotation.shift());
                updateUI();
                isScanning = false;
                setTimeout(() => { isScanning = true; }, 1200); 
            }
        }

        function checkLoop() {
            if (!isScanning || !window.alt1) { setTimeout(checkLoop, 200); return; }
            
            // Logic: Capture screen and search for the current 'Main' icon
            let screen = alt1.bindlnInterface(0, 0, alt1.rsWidth, alt1.rsHeight);
            let found = screen.findSubimage(document.getElementById("m"));

            // If the icon is GONE, it's on cooldown = ability used.
            if (found.length === 0) {
                document.getElementById("status").innerText = "DETECTED USE!";
                next();
            } else {
                document.getElementById("status").innerText = "LISTENING...";
            }
            setTimeout(checkLoop, 200);
        }
    </script>
</body>
</html>
