<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RotTracker</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <script>
        // THIS MUST BE AT THE TOP
        window.onload = function() {
            if (window.alt1) {
                alt1.identifyAppUrl("appconfig.json");
            }
        };

        let rotation = [];

        async function getWikiIcon(name) {
            if (!name) return "";
            const clean = name.trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const pages = data.query.pages;
                const id = Object.keys(pages)[0];
                return id !== "-1" ? pages[id].imageinfo[0].url : "";
            } catch (e) { return ""; }
        }

        async function update() {
            document.getElementById("m").src = await getWikiIcon(rotation[0]);
            document.getElementById("s1").src = await getWikiIcon(rotation[1]);
            document.getElementById("s2").src = await getWikiIcon(rotation[2]);
        }

        function start() {
            rotation = document.getElementById("i").value.split(',').map(s => s.trim());
            update();
        }

        function next() {
            rotation.push(rotation.shift());
            update();
        }
    </script>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        .slots { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        #m { width: 80px; height: 80px; border: 2px solid gold; }
        .s { width: 40px; height: 40px; border: 1px solid gray; }
        textarea { width: 90%; height: 50px; background: #333; color: #0f0; }
    </style>
</head>
<body>
    <div class="slots">
        <img id="m">
        <div><img id="s1" class="s"><br><img id="s2" class="s"></div>
    </div>
    <textarea id="i" placeholder="Surge, Resonance, Devotion"></textarea><br>
    <button onclick="start()">SAVE</button>
    <button onclick="next()">NEXT</button>
</body>
</html>
