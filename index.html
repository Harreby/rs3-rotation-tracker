<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotTracker - Full Ability Suite</title>
    <script src="https://runeapps.org/alt1/alt1lib.js"></script>
    <style>
        body { 
            background: #1a1a1a; 
            color: #dcdcdc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 10px; 
            margin: 0; 
            user-select: none; 
        }
        
        .slots { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            background: rgba(45, 45, 45, 0.8); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
        }
        #m { 
            width: 70px; 
            height: 70px; 
            border: 3px solid #ffd700; 
            border-radius: 5px; 
            background: #000; 
        }
        .s-container { display: flex; flex-direction: column; gap: 4px; }
        .s { 
            width: 32px; 
            height: 32px; 
            border: 1px solid #666; 
            border-radius: 3px; 
            background: #000; 
        }
        
        .controls { 
            background: #252525; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
        }
        label { display: block; text-align: left; font-size: 0.75em; margin-bottom: 4px; color: #aaa; }
        
        select, textarea { 
            width: 100%; 
            background: #111; 
            color: #eee; 
            border: 1px solid #444; 
            padding: 8px; 
            margin-bottom: 8px; 
            box-sizing: border-box; 
            font-family: monospace; 
            font-size: 12px; 
        }
        textarea { height: 50px; resize: none; color: #b0ffb0; }

        /* Style Colors */
        [label="Melee"], [label="Melee"] option { color: #ff6060; font-weight: bold; }
        [label="Ranged"], [label="Ranged"] option { color: #60ff60; font-weight: bold; }
        [label="Magic"], [label="Magic"] option { color: #60c0ff; font-weight: bold; }
        [label="Necromancy"], [label="Necromancy"] option { color: #c080ff; font-weight: bold; }
        [label*="Defen"], [label*="Defen"] option { color: #aaaaaa; }

        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-add { background: #333; color: #eee; width: 100%; margin-bottom: 10px; border: 1px solid #555;}
        .btn-save { background: #2e7d32; color: white; width: 45%; }
        .btn-next { background: #1565c0; color: white; width: 45%; }
        #status { font-size: 0.8em; color: #00ff00; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="slots">
        <img id="m" crossorigin="anonymous">
        <div class="s-container">
            <img id="s1" class="s" crossorigin="anonymous">
            <img id="s2" class="s" crossorigin="anonymous">
        </div>
    </div>

    <div class="controls">
        <div id="status">STATUS: STANDBY</div>
        
        <select id="ability-picker">
            <optgroup label="Constitution / Defense / Movement">
                <option value="Surge">Surge</option>
                <option value="Dive">Dive</option>
                <option value="Escape">Escape</option>
                <option value="Anticipation">Anticipation</option>
                <option value="Freedom">Freedom</option>
                <option value="Resonance">Resonance</option>
                <option value="Devotion">Devotion</option>
                <option value="Debilitate">Debilitate</option>
                <option value="Reflect">Reflect</option>
                <option value="Barricade">Barricade</option>
            </optgroup>
            <optgroup label="Necromancy">
                <option value="Necromancy (ability)">Necromancy (Auto)</option>
                <option value="Touch of Death">Touch of Death</option>
                <option value="Finger of Death">Finger of Death</option>
                <option value="Death Skulls">Death Skulls</option>
                <option value="Soul Feast">Soul Feast</option>
                <option value="Volley of Souls">Volley of Souls</option>
                <option value="Living Death">Living Death</option>
                <option value="Conjure Undead Army">Conjure Undead Army</option>
                <option value="Command Skeleton Warrior">Command Skeleton</option>
                <option value="Command Putrid Zombie">Command Zombie</option>
                <option value="Command Vengeful Ghost">Command Ghost</option>
                <option value="Bloat">Bloat</option>
                <option value="Blood Siphon">Blood Siphon</option>
                <option value="Spectral Scythe">Spectral Scythe</option>
            </optgroup>
            <optgroup label="Ranged">
                <option value="Greater Ricochet">G-Ricochet</option>
                <option value="Dazing Shot">Dazing Shot</option>
                <option value="Needle Strike">Needle Strike</option>
                <option value="Snipe">Snipe</option>
                <option value="Fragmentation Shot">Frag Shot</option>
                <option value="Corruption Shot">Corruption Shot</option>
                <option value="Rapid Fire">Rapid Fire</option>
                <option value="Snap Shot">Snap Shot</option>
                <option value="Bombardment">Bombardment</option>
                <option value="Greater Deaths Swiftness">Death's Swiftness</option>
            </optgroup>
            <optgroup label="Magic">
                <option value="Greater Concentrated Blast">G-Conc Blast</option>
                <option value="Greater Sonic Wave">G-Sonic Wave</option>
                <option value="Dragon Breath">Dragon Breath</option>
                <option value="Corruption Blast">Corruption Blast</option>
                <option value="Combust">Combust</option>
                <option value="Wild Magic">Wild Magic</option>
                <option value="Asphyxiate">Asphyxiate</option>
                <option value="Greater Sunshine">Sunshine</option>
                <option value="Omnipower">Omnipower</option>
                <option value="Magma Tempest">Magma Tempest</option>
            </optgroup>
            <optgroup label="Melee">
                <option value="Slice">Slice</option>
                <option value="Dismember">Dismember</option>
                <option value="Sever">Sever</option>
                <option value="Greater Fury">G-Fury</option>
                <option value="Cleave">Cleave</option>
                <option value="Decimate">Decimate</option>
                <option value="Havoc">Havoc</option>
                <option value="Assault">Assault</option>
                <option value="Greater Flurry">G-Flurry</option>
                <option value="Hurricane">Hurricane</option>
                <option value="Quake">Quake</option>
                <option value="Berserk">Berserk</option>
            </optgroup>
        </select>
        <button class="btn-add" onclick="addFromDropdown()">+ Add to Rotation</button>

        <textarea id="i" placeholder="Ability1, Ability2..."></textarea>
        
        <div style="display: flex; justify-content: center;">
            <button class="btn-save" onclick="start()">SAVE & SCAN</button>
            <button class="btn-next" onclick="next()">NEXT</button>
        </div>
    </div>

    <script>
        let rotation = [];
        let isScanning = false;

        window.onload = function() {
            if (window.alt1) {
                alt1.identifyAppUrl("appconfig.json");
            }
        };

        async function getWikiIcon(name) {
            if (!name) return "https://via.placeholder.com/80/000000/333333?text=Empty";
            const clean = name.trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('_');
            const url = `https://runescape.wiki/api.php?action=query&titles=File:${clean}.png&prop=imageinfo&iiprop=url&format=json&origin=*`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const pages = data.query.pages;
                const id = Object.keys(pages)[0];
                return id !== "-1" ? pages[id].imageinfo[0].url : "";
            } catch (e) { return ""; }
        }

        async function updateUI() {
            document.getElementById("m").src = await getWikiIcon(rotation[0]);
            document.getElementById("s1").src = await getWikiIcon(rotation[1]);
            document.getElementById("s2").src = await getWikiIcon(rotation[2]);
        }

        function addFromDropdown() {
            const input = document.getElementById("i");
            input.value += (input.value.trim().length > 0 ? ", " : "") + document.getElementById("ability-picker").value;
        }

        function start() {
            rotation = document.getElementById("i").value.split(',').map(s => s.trim()).filter(s => s !== "");
            updateUI();
            if(rotation.length > 0) {
                isScanning = true;
                document.getElementById("status").innerText = "STATUS: SCANNING...";
                checkScreenLoop();
            }
        }

        function next() {
            if (rotation.length > 1) {
                rotation.push(rotation.shift());
                updateUI();
                isScanning = false;
                setTimeout(() => { isScanning = true; }, 1200);
            }
        }

        function checkScreenLoop() {
            if (!isScanning || !window.alt1 || rotation.length === 0) {
                setTimeout(checkScreenLoop, 100);
                return;
            }

            let screen = alt1.bindlnInterface(0, 0, alt1.rsWidth, alt1.rsHeight);
            let found = screen.findSubimage(document.getElementById("m"));

            if (found.length === 0) {
                document.getElementById("status").innerText = "STATUS: USED!";
                next();
            } else {
                document.getElementById("status").innerText = "STATUS: READY...";
            }

            setTimeout(checkScreenLoop, 100);
        }
    </script>
</body>
</html>
